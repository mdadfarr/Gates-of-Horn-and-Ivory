<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Daily Gate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="frame popup">
    <div class="masthead">
      <h1 class="wordmark">Daily Gate</h1>
      <span class="masthead-meta" id="dateStamp"></span>
    </div>

    <div class="flag" id="flag"></div>
    <p class="status" id="statusWord">&nbsp;</p>
    <p class="standfirst" id="phaseNote"></p>

    <ol class="reqs" id="ledger"></ol>

    <div class="breaks" id="breaks"></div>

    <div class="notice" id="errorBox" hidden></div>

    <div class="actions">
      <button class="btn" id="recheckBtn">Check again</button>
      <a class="textlink" href="options.html" target="_blank" style="margin-left:auto; align-self:center;">Settings</a>
    </div>

    <p class="timestamp" id="lastCheckedHint"></p>
    <p class="timestamp" id="streakHint"></p>
    <p class="timestamp" id="capHint"></p>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>

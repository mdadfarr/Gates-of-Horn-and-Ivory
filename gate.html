<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Daily Gate — Blocked</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sheet">
    <div class="letterhead">
      <h1>Daily Gate</h1>
      <span class="stamp" id="siteStamp">—</span>
    </div>

    <div class="ledger" id="ledger">
      <div class="ledger-row">
        <span class="mark">…</span>
        <span class="label">Loading requirement ledger…</span>
        <span class="meta"></span>
      </div>
    </div>

    <div class="note" id="phaseNote">—</div>
    <div class="error-box" id="errorBox" style="display:none;"></div>

    <div class="footer-actions">
      <button id="recheckBtn">Check again now</button>
      <span class="hint" id="lastCheckedHint"></span>
    </div>
  </div>

  <script type="module" src="gate.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Gate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="frame">
    <div class="masthead">
      <h1 class="wordmark">Daily Gate</h1>
      <span class="masthead-meta" id="siteStamp"></span>
    </div>

    <div class="spread">
      <div class="rail" id="rail"></div>

      <figure class="plate">
        <img id="stateImg" src="images/1.png" alt="" />
      </figure>

      <div class="column">
        <div class="flag" id="flag"></div>
        <p class="eyebrow">Today</p>
        <p class="status" id="statusWord">&nbsp;</p>
        <p class="standfirst" id="phaseNote"></p>

        <ol class="reqs" id="ledger"></ol>

        <div class="resolution" id="unlockedNote" hidden></div>
        <div class="notice" id="errorBox" hidden></div>

        <div class="actions">
          <button class="btn" id="recheckBtn">Check again</button>
          <a class="btn btn-hollow" id="continueBtn" hidden href="#"></a>
        </div>

        <p class="timestamp" id="lastCheckedHint"></p>
      </div>
    </div>
  </main>

  <script type="module" src="gate.js"></script>
</body>
</html>

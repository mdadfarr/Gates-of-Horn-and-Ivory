<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Gate Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="frame frame-narrow">
    <div class="masthead">
      <h1 class="wordmark">Daily Gate</h1>
      <span class="masthead-meta">Settings / no override</span>
    </div>

    <div class="fields">

    <div class="field">
      <label class="field-label" for="githubUsername">GitHub username</label>
      <div>
        <input type="text" id="githubUsername" placeholder="mdadfarr" />
        <p class="field-note">Only public pushes count unless you add a token below.</p>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="githubToken">GitHub token</label>
      <div>
        <input type="password" id="githubToken" placeholder="optional" />
        <p class="field-note">Kept in local extension storage and sent only to api.github.com. Add one if you want pushes to private repos to count.</p>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="leetcodeUsername">LeetCode username</label>
      <div>
        <input type="text" id="leetcodeUsername" placeholder="mdadfar" />
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="phase1EndHour">Cutoff hour</label>
      <div>
        <select id="phase1EndHour"></select>
        <p class="field-note" id="scheduleExplain"></p>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="gatedSites">Blocked sites</label>
      <div>
        <textarea id="gatedSites" rows="4" placeholder="youtube.com"></textarea>
        <p class="field-note">One domain per line, no https://. New domains ask for a browser permission once.</p>
      </div>
    </div>

    </div>

    <div class="actions">
      <button class="btn" id="saveBtn">Save changes</button>
      <span class="saved-flag" id="savedFlag" hidden>Saved</span>
    </div>

    <p class="timestamp" id="statusNote"></p>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
